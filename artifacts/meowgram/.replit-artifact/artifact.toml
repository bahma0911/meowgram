kind = "web"
previewPath = "/"
title = "Meowgram"
version = "1.0.0"
id = "artifacts/meowgram"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23331
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/meowgram run dev"

[services.env]
PORT = "23331"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/meowgram", "run", "build"]
publicDir = "artifacts/meowgram/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
